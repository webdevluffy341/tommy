<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Tommy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff4fd8,#7d5cff,#00c3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#ffffff55 2px,transparent 2px);
    background-size:40px 40px;
    animation:moveBg 20s linear infinite;
    opacity:0.3;
}

@keyframes moveBg{
    0%{transform:translate(0,0);}
    100%{transform:translate(-200px,-200px);}
}

/* Main Card */
.container{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.12);
    padding:50px;
    border-radius:30px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(0,0,0,0.3);
    width:90%;
    max-width:700px;
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:4rem;
    font-weight:700;
    margin-bottom:15px;
    text-shadow:0 0 20px rgba(255,255,255,0.7);
}

h2{
    font-size:2rem;
    margin-bottom:20px;
    color:#ffe66d;
}

p{
    font-size:1.1rem;
    margin-bottom:30px;
    opacity:0.9;
}

/* Button */
.discord-btn{
    display:inline-block;
    padding:15px 35px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#5865F2,#7289DA);
    font-size:1.1rem;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 0 20px rgba(88,101,242,0.5);
}

.discord-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 35px rgba(88,101,242,0.8);
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-150px;
    width:80px;
    height:100px;
    border-radius:50%;
    animation:float 10s infinite ease-in;
}

.balloon::after{
    content:'';
    position:absolute;
    width:2px;
    height:80px;
    background:white;
    left:50%;
    top:100px;
}

.balloon1{
    left:10%;
    background:#ff4d6d;
    animation-duration:9s;
}

.balloon2{
    left:30%;
    background:#ffd93d;
    animation-duration:12s;
}

.balloon3{
    left:50%;
    background:#6bcB77;
    animation-duration:10s;
}

.balloon4{
    left:70%;
    background:#4d96ff;
    animation-duration:11s;
}

.balloon5{
    left:90%;
    background:#d66efd;
    animation-duration:13s;
}

@keyframes float{
    0%{
        transform:translateY(0);
    }
    100%{
        transform:translateY(-120vh);
    }
}

/* Responsive */
@media(max-width:768px){
    h1{
        font-size:2.5rem;
    }

    h2{
        font-size:1.5rem;
    }

    .container{
        padding:30px;
    }
}
</style>
</head>

<body>

<div class="balloon balloon1"></div>
<div class="balloon balloon2"></div>
<div class="balloon balloon3"></div>
<div class="balloon balloon4"></div>
<div class="balloon balloon5"></div>

<div class="container">
    <h1>🎉 HAPPY BIRTHDAY 🎉</h1>
    <h2>TOMMY</h2>

    <p>
        Wishing you an amazing day filled with happiness, fun,
        success, and unforgettable memories! 🎂🎁
    </p>

   <!-- Replace your old Discord button with this -->

<a href="https://discord.gg/YX6233zuT6" target="_blank" class="discord-btn">
    Join Discord
 </a>
</div>

</body>
</html>
